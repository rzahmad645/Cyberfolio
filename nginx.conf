server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/conf.d/security-headers.conf;  # new

  # Remove .html extension from URLs
  # If someone accesses a URL with .html, redirect to without .html
  if ($request_uri ~ ^/(.*)\.html$) {
    return 301 /$1;
  }

  # Redirect root to /home
  location = / {
    return 301 /home;
  }

  # Handle /home route (serves index.html)
  location = /home {
    try_files /index.html =404;
  }

  location / {
    # Try the requested URI, then with .html, then as directory, then 404
    try_files $uri $uri.html $uri/ =404;
  }

  # Handle directories (trailing slash)
  location ~ ^(.+)/$ {
    try_files $1.html $1/index.html =404;
  }

  # long-cache for static files; bust with ?v=#
  location ~* \.(css|js|png|jpe?g|gif|svg|webp|ico|ttf|otf|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
}
